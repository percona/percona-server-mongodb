# Composite action to install the mergai CLI tool from the Percona-Lab/mergai repository.
# This action is typically called by setup-mergai-workflow but can be used standalone.
# mergai is installed as an isolated Python application using pipx.
name: "mergai setup"
description: "Setting up the mergai tool"

inputs:
  token:
    # Percona-Lab/mergai is public, so no caller-supplied token is needed -
    # the job's GITHUB_TOKEN can read any public repo. This is an optional
    # override to pin a different identity. The `default: ""` below is just an
    # empty placeholder; the real `github.token` fallback lives at the usage
    # site (`inputs.token || github.token`), NOT in this default. It must work
    # that way because callers forward an empty string (e.g. an unset
    # github-app-token), and an explicitly-passed empty value overrides an
    # input default - so a `default: github.token` here would never apply.
    description: "GitHub token for the mergai checkout (default: job GITHUB_TOKEN)."
    required: false
    default: ""
  ref:
    description: "Git reference (branch, tag, commit SHA) to checkout mergai from"
    required: false
    default: "master" # Use master branch by default; override for testing specific versions

runs:
  using: "composite"
  steps:
    # Clone the mergai tool repository into a subdirectory.
    # After installation, the directory is removed to avoid untracked files
    # that would interfere with git operations.
    - name: Checkout mergai repo
      uses: actions/checkout@v6
      with:
        repository: Percona-Lab/mergai
        ref: ${{ inputs.ref }}
        # Fall back to the job's GITHUB_TOKEN when no override is supplied.
        # Must be `|| github.token` here rather than an input default: a caller
        # forwarding an empty string overrides the default, but `'' || x` → x.
        token: ${{ inputs.token || github.token }}
        path: mergai # Checkout to 'mergai' subdirectory, not the workspace root

    # Install mergai using pipx for isolated Python environment.
    # pipx ensures the tool's dependencies don't conflict with other Python packages.
    # Steps:
    #   1. Install pipx via pip (user install to avoid permission issues)
    #   2. Ensure pipx bin directory is in PATH
    #   3. Install mergai from the local checkout
    #   4. Remove the checkout directory to keep the workspace clean
    - name: Install mergai
      shell: bash
      run: |
        python3 -m pip install --user pipx
        # Ensure pipx's bin directory is available in this step and subsequent steps
        export PATH="$HOME/.local/bin:$PATH"
        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        python3 -m pipx ensurepath
        python3 -m pipx install ./mergai
        # Remove checkout directory to avoid untracked files in git operations
        rm -rf ./mergai
