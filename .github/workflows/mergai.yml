name: mergai bot

on:
  # Manual entry point: start a new merge of an upstream commit.
  workflow_dispatch:
    inputs:
      merge-pick:
        description: "Commit hash to merge (bypasses the gate). Empty -> pick per MERGAI_MERGE_PICK_MODE (gate/ai/next; default gate)."
        required: false
        type: string
      mergai-ref:
        description: "MergAI git ref (branch/tag/commit). Empty -> MERGAI_REF repo variable, else master."
        required: false
        type: string
        default: ""
      mergai-agent:
        description: "AI agent to use for merge/describe/resolve (e.g., claude-cli:claude-opus-4-5)"
        required: false
        type: string
  # Finalize entry point: when a mergai review PR is merged.
  pull_request:
    types: [closed]
    branches:
      - "mergai/*/conflict"
      - "mergai/*/main"
  # CI auto-fix entry point: fires when a watched workflow completes on a
  # mergai/* branch.
  workflow_run:
    workflows: ["format", "clang-tidy", "build-and-test"]
    types: [completed]
    branches:
      - "mergai/**"
  # Comment entry points on a mergai PR:
  #   * `/mergai review fix` -> review-handle, address review threads.
  #   * `/mergai rebase`     -> rebase-handle, rebase the branch onto its base.
  issue_comment:
    types: [created]
  # Review-handling entry point: a review submitted as "Changes requested".
  pull_request_review:
    types: [submitted]

jobs:
  trigger-merge:
    # 'privileged-ops' environment controls access to merge operations and AI tokens
    environment: privileged-ops
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
      GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION }}
      GOOGLE_GENAI_USE_VERTEXAI: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.PSMDB_BOT_GH_APP_ID }}
          private-key: ${{ secrets.PSMDB_BOT_GH_APP_PRIVATE_KEY }}

      # TODO: Add team membership check once GitHub App with Organization Members read permission is available
      # - name: Check team authorization
      #   env:
      #     GH_TOKEN: ${{ steps.app-token.outputs.token }}
      #   run: |
      #     echo "Checking if ${{ github.actor }} is a member of percona/dev-psmdb team..."
      #     if ! gh api "/orgs/percona/teams/dev-psmdb/memberships/${{ github.actor }}" --silent 2>/dev/null; then
      #       echo "::error::User ${{ github.actor }} is not authorized to trigger this workflow. Must be a member of percona/dev-psmdb team."
      #       exit 1
      #     fi
      #     echo "User ${{ github.actor }} is authorized"

      - name: Setup workflow environment
        uses: ./.github/actions/setup-mergai-workflow
        with:
          setup-gcp: "true"
          setup-gemini: "true"
          setup-claude: "true"
          setup-mergai: "true"
          gcp-credentials: ${{ secrets.GCP_CREDENTIALS }}
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}
          github-app-token: ${{ steps.app-token.outputs.token }}
          github-app-id: ${{ secrets.PSMDB_BOT_GH_APP_ID }}
          mergai-ref: ${{ inputs['mergai-ref'] || vars.MERGAI_REF || 'master' }}

      # Determine the commit to merge to. Precedence:
      #   1. an explicit merge-pick input -> use it, bypassing the gate (the
      #      manual "force this merge" path);
      #   2. else the MERGAI_MERGE_PICK_MODE repository variable (not a secret),
      #      one of three values:
      #        * "ai"   -> the agent chooses the boundary within the gate's
      #                    candidate window (uses AI tokens, hence in this
      #                    privileged-ops job); honors the gate.
      #        * "next" -> raw `merge-pick --next`: the first prioritized strategy
      #                    match, with NO gate and NO window cap.
      #        * "gate" -> gate-respecting deterministic pick (windowed). This is
      #                    the default for an unset/any-other value.
      # "ai" and "gate" honor the merge gate: when it is closed (or nothing to
      # merge) they print nothing, so MERGE_PICK is empty and the merge steps
      # below are skipped. "next" ignores the gate. To merge regardless of the
      # gate, dispatch with an explicit merge-pick input.
      - name: Determine merge pick
        id: pick
        env:
          MERGE_PICK_MODE: ${{ vars.MERGAI_MERGE_PICK_MODE }}
          INPUT_PICK: ${{ inputs['merge-pick'] }}
        run: |
          MERGE_PICK=""
          if [ -n "$INPUT_PICK" ]; then
            echo "Using explicit merge-pick input (gate bypassed): $INPUT_PICK"
            MERGE_PICK="$INPUT_PICK"
          else
            case "$MERGE_PICK_MODE" in
              ai)
                echo "Merge-pick mode: ai (gate-respecting)"
                # --json carries the agent's reasoning alongside the sha; --next
                # would print only the bare sha and the reasoning would be lost.
                PICK_JSON=$(mergai fork merge-pick --ai --json)
                if [ -n "$PICK_JSON" ]; then
                  MERGE_PICK=$(printf '%s' "$PICK_JSON" | jq -r '.sha // empty')
                  AI_SOURCE=$(printf '%s' "$PICK_JSON" | jq -r '.source // empty')
                  AI_REASONING=$(printf '%s' "$PICK_JSON" | jq -r '.reasoning // empty')
                  echo "AI pick source: ${AI_SOURCE:-unknown}"
                  if [ -n "$AI_REASONING" ]; then
                    echo "AI pick reasoning: $AI_REASONING"
                    {
                      echo "### AI merge-pick"
                      echo ""
                      echo "- commit: \`${MERGE_PICK}\`"
                      echo "- source: ${AI_SOURCE:-unknown}"
                      echo ""
                      echo "${AI_REASONING}"
                    } >> "$GITHUB_STEP_SUMMARY"
                  fi
                fi
                ;;
              next)
                echo "Merge-pick mode: next (raw strategy pick; ignores the gate)"
                MERGE_PICK=$(mergai fork merge-pick --next)
                ;;
              *)
                echo "Merge-pick mode: gate (gate-respecting deterministic)"
                MERGE_PICK=$(mergai fork merge-pick --gate)
                ;;
            esac
          fi
          echo "MERGE_PICK=$MERGE_PICK" >> "$GITHUB_ENV"
          echo "pick=$MERGE_PICK" >> "$GITHUB_OUTPUT"
          if [ -z "$MERGE_PICK" ]; then
            echo "No merge pick (merge gate closed or nothing to merge); skipping merge."
          else
            echo "Merge pick: $MERGE_PICK"
            git show --stat "$MERGE_PICK"
          fi

      # Initialize merge context with commit SHA and target branch info.
      - name: mergai context init
        if: steps.pick.outputs.pick != ''
        run: mergai context init "$MERGE_PICK"

      # Early-fail if a merge for this commit is already underway: any mergai
      # branch (main/conflict/solution/semantic) for $MERGE_PICK means another
      # trigger-merge run already started it. Abort rather than race it. This
      # also covers the window the periodic-merge workflow can't see (a run
      # dispatched but still awaiting privileged-ops approval, with no PR yet).
      - name: Fail if a merge for this commit is already in progress
        if: steps.pick.outputs.pick != ''
        run: |
          if [ -n "$(mergai branch list --sha "$MERGE_PICK" -q)" ]; then
            echo "::error::mergai branches already exist for $MERGE_PICK - merge already in progress"
            mergai branch list --sha "$MERGE_PICK"
            exit 1
          fi

      - name: merge
        if: steps.pick.outputs.pick != ''
        env:
          MERGAI_AGENT: ${{ inputs['mergai-agent'] }}
        run: |
          # Fetch and merge notes from remote
          mergai notes update

          # Build merge command with optional agent
          MERGE_CMD="mergai merge"
          RESOLVE_CMD="mergai resolve -y"
          if [ -n "$MERGAI_AGENT" ]; then
            MERGE_CMD="$MERGE_CMD --agent \"$MERGAI_AGENT\""
            RESOLVE_CMD="$RESOLVE_CMD --agent \"$MERGAI_AGENT\""
          fi

          # Attempt merge; exit code 0 = success, 1 = conflicts
          if eval $MERGE_CMD; then
            echo "Merge successful. Committing merge."
            mergai commit merge              # Create merge commit with note attached
            mergai branch create main        # Create and checkout main working branch
            mergai branch push main          # Push main branch to origin
            mergai notes push                # Push mergai notes to remote
            mergai pr --repo "$GITHUB_REPOSITORY" create main --skip-commit-list-on-failure
          else
            echo "Merge conflict detected. Processing with resolution."
            mergai commit conflict           # Commit conflict state with markers
            mergai branch create conflict    # Create branch with conflict markers
            mergai branch create solution    # Create branch for AI solution
            eval $RESOLVE_CMD                # Run AI conflict resolution (yolo mode)
            mergai commit solution           # Commit resolved files with note
            mergai branch push solution      # Push solution branch
            mergai branch push conflict      # Push conflict branch
            mergai notes push                # Push mergai notes to remote
            mergai pr --repo "$GITHUB_REPOSITORY" create solution --skip-commit-list-on-failure
          fi

  solution-merged:
    environment: privileged-ops
    # Solution PRs (textual conflict resolution) merge into the conflict
    # branch. Semantic PRs merge into main and are handled by `semantic-merged`.
    if: >-
      github.event_name == 'pull_request'
      && github.event.pull_request.merged == true
      && endsWith(github.event.pull_request.base.ref, '/conflict')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.PSMDB_BOT_GH_APP_ID }}
          private-key: ${{ secrets.PSMDB_BOT_GH_APP_PRIVATE_KEY }}

      - name: Setup workflow environment
        uses: ./.github/actions/setup-mergai-workflow
        with:
          setup-gcp: "false"
          setup-gemini: "false"
          setup-mergai: "true"
          github-app-token: ${{ steps.app-token.outputs.token }}
          github-app-id: ${{ secrets.PSMDB_BOT_GH_APP_ID }}
          mergai-ref: ${{ vars.MERGAI_REF || 'master' }}

      # Finalize after solution PR is merged into conflict branch
      - name: Finalize
        run: |
          mergai notes update              # Fetch and merge notes from remote
          mergai context init              # Rebuild context from commit notes
          mergai branch create main        # Create main working branch
          mergai commit sync               # Sync manual commits to notes
          mergai finalize                  # Finalize into final merge commit
          mergai branch push main          # Push main branch to origin
          mergai notes push                # Push mergai notes to remote
          # --skip-commit-list-on-failure retries without the merged-commit
          # table if the body exceeds GitHub's 65,536 character limit.
          mergai pr --repo "$GITHUB_REPOSITORY" create main --skip-commit-list-on-failure

  semantic-merged:
    environment: privileged-ops
    # Semantic PRs merge into the main branch.
    # Once merged, run finalize and then force-push main.
    # The main PR (main -> target) already exists and updates itself,
    # so nothing is created here.
    if: >-
      github.event_name == 'pull_request'
      && github.event.pull_request.merged == true
      && endsWith(github.event.pull_request.base.ref, '/main')
    runs-on: ubuntu-latest
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.PSMDB_BOT_GH_APP_ID }}
          private-key: ${{ secrets.PSMDB_BOT_GH_APP_PRIVATE_KEY }}

      - name: Checkout main branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup workflow environment
        uses: ./.github/actions/setup-mergai-workflow
        with:
          setup-gcp: "false"
          setup-gemini: "false"
          setup-mergai: "true"
          github-app-token: ${{ steps.app-token.outputs.token }}
          github-app-id: ${{ secrets.PSMDB_BOT_GH_APP_ID }}
          mergai-ref: master

      # Run finalize and force-push main branch.
      - name: Finalize semantic fixes into the merge commit
        run: |
          mergai notes update              # Fetch and merge notes from remote
          mergai context init              # Rebuild context from commit notes
          mergai commit sync               # Record any manual commits in notes
          mergai finalize                  # Fold semantic fixes into the merge commit
          mergai branch push main --force  # main was rewritten by finalize
          mergai notes push                # Push mergai notes to remote
          # Refresh the main PR description so it now includes the merged-in
          # solutions (the semantic fixes), which the merge notice points to.
          mergai pr --repo "$GITHUB_REPOSITORY" update main \
            || echo "::warning::'mergai pr update main' failed"

      # Close the loop on the main PR: the semantic (solution) PR has been
      # merged and finalized into the merge commit. Mirrors the one-time
      # pointer the ci-handle job posts when the semantic PR opens.
      - name: Comment on the main PR that the solution PR was merged
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          SEMANTIC_PR: ${{ github.event.pull_request.number }}
        run: |
          # Resolves the main PR from the note context loaded by Finalize above;
          # --allow-missing makes a missing main PR a warning, not a failure.
          mergai pr --repo "$GITHUB_REPOSITORY" comment main --allow-missing \
            --body "PR #${SEMANTIC_PR} merged. See the PR comment for details."

  # Drive the CI auto-fix / finalize loop as a gated state
  # machine. On every watched workflow completion for a mergai/* branch we ask
  # `mergai ci status --state` whether the *whole* watched set for the current
  # HEAD is done, then:
  #   * in-progress / none -> no-op (a later completion finalizes the set);
  #   * failure            -> `mergai ci fix all` (+ post explanation comment),
  #                           push notes. Where the fix lands is branch-aware:
  #                             - solution/semantic branches: commit inline and
  #                               push (the open PR is the review surface);
  #                             - main branch: the failure is a *semantic
  #                               conflict* (clean merge that doesn't build), so
  #                               the fix is relocated onto a `semantic` branch
  #                               + PR (base main) for review.
  #   * success            -> no-op. Nothing is folded on green: folding the
  #                           review commits into the merge commit is a
  #                           finalize-only step that runs after a human merges
  #                           the review PR, so an open PR's commits (e.g. the
  #                           resolve commit) survive for review.
  # Reacting to each completion individually would either fire before the set
  # is green or fire once per workflow; gating on the aggregate state makes
  # the loop converge.
  #
  # The state machine is split into two jobs so the privileged half only runs
  # when there is privileged work to do:
  #   * ci-gate   - read-only. Computes the aggregate state with the default
  #                 GITHUB_TOKEN; needs no AI tokens, no GitHub App token, and
  #                 no `privileged-ops` environment. Runs on every completion.
  #   * ci-handle - privileged. Gated on ci-gate's state == failure, so
  #                 in-progress/none/success completions never spin it up (and
  #                 never trip the privileged-ops approval/secrets path).
  #                 success is a no-op now that folding into the merge commit
  #                 is finalize-only.
  ci-gate:
    # Only react to watched-workflow completions. The workflow also fires on
    # workflow_dispatch and pull_request (for other jobs); without this guard
    # ci-gate would run on those too, since the mergai/* branch filter on the
    # workflow_run trigger only constrains workflow_run events. The branch
    # filter itself stays on the trigger.
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest
    permissions:
      actions: read # mergai ci status -> get_workflow_runs
      contents: read # checkout
      pull-requests: read # read PR labels (mergai-skip-ci-fix)
    # Serialize completions for the same branch so two near-simultaneous
    # workflow_run events can't each observe the other as in-progress and both
    # no-op (a deadlock). The last-queued gate sees the full set done. This
    # serialization belongs on the gate - it is what observes the aggregate
    # state; the downstream handle just acts on the gate's verdict.
    concurrency:
      group: ci-handle-${{ github.event.workflow_run.head_branch }}
      cancel-in-progress: false
    outputs:
      state: ${{ steps.gate.outputs.state }}
      skip_ci_fix: ${{ steps.skip-label.outputs.skip_ci_fix }}
    steps:
      # Checkout with the default token: the gate only reads workflow-run
      # status and the watched set from .mergai/config.yml - no writes, so no
      # GitHub App token needed.
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - name: Setup workflow environment
        uses: ./.github/actions/setup-mergai-workflow
        with:
          setup-gcp: "false"
          setup-gemini: "false"
          setup-claude: "false"
          setup-mergai: "true"
          mergai-ref: master

      # Gate: reduce the latest run of each watched workflow for the current
      # HEAD to a single token (in-progress|success|failure|none). Exit code is
      # always 0; the decision is on stdout and exposed as a job output.
      - name: Gate on watched workflow completion
        id: gate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          STATE=$(mergai ci status --state)
          echo "Watched-workflow gate state for HEAD: $STATE"
          echo "state=$STATE" >> "$GITHUB_OUTPUT"

      # Opt-out switch: a human can attach the `mergai-skip-ci-fix` label to the
      # PR for the head branch to suppress the AI auto-fixer. We resolve the PR
      # from head_branch and read its labels live (the label is typically added
      # after the PR opens, so the workflow_run payload can't be trusted for it).
      # When set, ci-handle is gated off below, so the privileged-ops job never
      # spins up. Removing the label lets the next watched-workflow completion
      # resume auto-fixing. Failures here fall through to skip_ci_fix=false so a
      # transient API error never silently disables fixing.
      - name: Check for mergai-skip-ci-fix label
        id: skip-label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          LABELS=$(gh pr list --head "$HEAD_BRANCH" --state open \
            --json labels --jq '.[0].labels[].name' 2>/dev/null || echo "")
          if echo "$LABELS" | grep -qx "mergai-skip-ci-fix"; then
            echo "mergai-skip-ci-fix present on PR for $HEAD_BRANCH; CI auto-fix suppressed"
            echo "skip_ci_fix=true" >> "$GITHUB_OUTPUT"
          else
            echo "No mergai-skip-ci-fix label; CI auto-fix may proceed"
            echo "skip_ci_fix=false" >> "$GITHUB_OUTPUT"
          fi

  ci-handle:
    needs: ci-gate
    # Only failure reaches the privileged job; in-progress/none/success simply
    # fall through here. success no longer folds anything into the merge commit
    # (that is finalize-only, after a human merges the review PR), so it is a
    # no-op.
    # The `mergai-skip-ci-fix` label on the PR suppresses the auto-fixer
    # entirely: with it set, even a failure is a no-op and this privileged-ops
    # job never starts.
    if: needs.ci-gate.outputs.state == 'failure' && needs.ci-gate.outputs.skip_ci_fix != 'true'
    environment: privileged-ops
    runs-on: ubuntu-latest
    env:
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
      GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION }}
      GOOGLE_GENAI_USE_VERTEXAI: "true"
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.PSMDB_BOT_GH_APP_ID }}
          private-key: ${{ secrets.PSMDB_BOT_GH_APP_PRIVATE_KEY }}

      # -----------------------------------------------------------------------
      # Why we trust github.event.workflow_run.head_branch / head_sha here
      # -----------------------------------------------------------------------
      # A workflow_run event carries head_branch/head_sha describing what the
      # completed workflow ran against. How those are populated depends on the
      # triggering event:
      #
      #   * format, clang-tidy  -> triggered by `pull_request`. The run executes
      #     in the PR head context, so head_branch = the PR source branch
      #     (mergai/.../solution or mergai/.../main) and head_sha = the PR head.
      #
      #   * build-and-test      -> triggered by `pull_request_target`. By design
      #     this event runs in the BASE branch context (that is how it exposes
      #     secrets safely). The documented behavior is that head_branch/head_sha
      #     point at the PR BASE for *fork* PRs.
      #
      # Classic failure mode (fork PRs): on a build-and-test completion you would
      # check out the base (conflict) branch and commit a "fix" on the wrong
      # branch, and the gate could never reconcile the solution-branch SHA with
      # the base SHA.
      #
      # That failure mode does NOT apply to mergai PRs: mergai's head branches
      # (mergai/.../solution, mergai/.../main) live in the SAME repo as the base,
      # and for same-repo PRs GitHub reports the real PR head ref for
      # pull_request_target too. Verified on live PRs -- format, clang-tidy and
      # build-and-test all report the identical head_branch and head_sha for a
      # given PR commit. So gating on "latest run per watched workflow whose
      # head_sha == HEAD" is correct, and checking out head_branch lands on the
      # right (head) branch.
      #
      # We gate via `get_workflow_runs(branch=...)` (what `mergai ci status`
      # uses), NOT the commit Checks API: the Checks API on the PR head SHA
      # surfaces only mergai-bot's own jobs, not the watched workflows.
      #
      # If mergai ever opens solution/main PRs from a FORK, revisit this: resolve
      # the PR from the run and gate on the PR head SHA instead of the event
      # fields.
      # -----------------------------------------------------------------------
      - name: Checkout PR branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup workflow environment
        uses: ./.github/actions/setup-mergai-workflow
        with:
          setup-gcp: "true"
          setup-gemini: "true"
          setup-claude: "true"
          setup-mergai: "true"
          gcp-credentials: ${{ secrets.GCP_CREDENTIALS }}
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}
          github-app-token: ${{ steps.app-token.outputs.token }}
          github-app-id: ${{ secrets.PSMDB_BOT_GH_APP_ID }}
          mergai-ref: master

      - name: Fetch and load mergai notes
        run: |
          mergai notes update
          mergai context init

      # Re-evaluate the gate at handle time. ci-gate froze its verdict into
      # needs.ci-gate.outputs.state *before* the privileged-ops approval; the
      # branch can recover in between (e.g. a cancelled watched run is re-run
      # and passes), so that verdict may be stale by the time this job actually
      # runs. Recompute the live state with the same check ci-gate uses and
      # route the steps below off it, so an approval granted late (or a
      # superseded failure) becomes a clean no-op instead of a fix against a
      # now-green branch. The job-level `if:` still gates the privileged-ops
      # request on the original failure; this only suppresses acting on it.
      - name: Re-check gate
        id: recheck
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          STATE=$(mergai ci status --state)
          echo "Live gate state at handle time: $STATE"
          echo "state=$STATE" >> "$GITHUB_OUTPUT"

      # Any watched run for HEAD failed/cancelled. Run the fixer once here; the
      # steps below route the result based on whether a fix commit landed and
      # which branch CI ran on. `mergai ci fix all` resolves the failing runs
      # from the *current* branch and commits the fix on HEAD, so we always run
      # it on the branch CI ran on. `fix_produced`/`before` are exposed as step
      # outputs for the routing steps.
      - name: Apply CI fixes (state=failure)
        id: fix
        if: steps.recheck.outputs.state == 'failure'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          before=$(git rev-parse HEAD)
          mergai ci fix all
          after=$(git rev-parse HEAD)
          echo "before=$before" >> "$GITHUB_OUTPUT"
          if [ "$before" = "$after" ]; then
            echo "No fix commit produced."
            echo "fix_produced=false" >> "$GITHUB_OUTPUT"
          else
            echo "Fix commit produced ($after)."
            echo "fix_produced=true" >> "$GITHUB_OUTPUT"
          fi

      # No fix commit (e.g. an unfixable failure): `ci comment post` still
      # publishes the recorded explanation on the run's own PR.
      - name: Post explanation comment (no fix produced)
        if: steps.recheck.outputs.state == 'failure' && steps.fix.outputs.fix_produced == 'false'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: mergai ci comment post

      # The main branch carries the bare merge commit and is NOT a review
      # branch. A failure here is a *semantic conflict* (a clean merge that
      # doesn't build/pass). We must not advance main with an un-reviewed fix,
      # so the fix commit is relocated onto a dedicated `semantic` branch and
      # reviewed via a `semantic` PR (base = main). origin/main is never pushed here.
      - name: Relocate fix to semantic branch (semantic conflict on */main)
        if: steps.recheck.outputs.state == 'failure' && steps.fix.outputs.fix_produced == 'true' && endsWith(github.event.workflow_run.head_branch, '/main')
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          echo "Semantic conflict on $HEAD_BRANCH; relocating the fix to a semantic branch"
          # Move the just-produced fix commit(s) onto a fresh semantic branch.
          # `mergai branch create semantic` derives the branch name and fails if
          # it already exists (locally or on origin). The semantic branch must
          # not exist at this point, so a pre-existing one is a hard error -- we
          # let the step fail rather than replaying the fix onto a stale branch.
          mergai branch create semantic
          mergai branch push semantic
          # The branch is always fresh, so this is the first (and only) PR for
          # it. Open it, then post a one-time pointer on the main PR.
          mergai pr --repo "$GITHUB_REPOSITORY" create semantic --skip-commit-list-on-failure
          SEMANTIC_PR=$(mergai pr --repo "$GITHUB_REPOSITORY" number semantic)
          mergai pr --repo "$GITHUB_REPOSITORY" comment main --allow-missing \
            --body "One or more checks failed. PR #${SEMANTIC_PR} opened with fixes for review."
          # Refresh the semantic PR body (the rolling fixes summary, rebuilt
          # from the note's solutions) and post the CI-fix notice on it.
          mergai pr --repo "$GITHUB_REPOSITORY" update semantic \
            || echo "::warning::'mergai pr update semantic' failed"
          mergai ci comment post --review-pr "$SEMANTIC_PR"

      # solution / semantic branches are review branches: the fix rides inline
      # as another commit and is reviewed in the existing PR. Nothing is folded
      # here -- folding into the merge commit happens only at finalize, after
      # the PR is merged, so the resolve commit survives.
      - name: Push inline fix (review branch)
        if: steps.recheck.outputs.state == 'failure' && steps.fix.outputs.fix_produced == 'true' && !endsWith(github.event.workflow_run.head_branch, '/main')
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          echo "Pushing inline fix to $HEAD_BRANCH"
          git push origin "HEAD:$HEAD_BRANCH"
          # Refresh the PR body from the note's solutions, then post a short
          # notification.
          mergai pr --repo "$GITHUB_REPOSITORY" update \
            || echo "::warning::'mergai pr update' failed"
          mergai ci comment post

      # Always push notes when a fix was attempted: ci_comments / posted markers
      # may have changed even when no commit was produced.
      - name: Push mergai notes
        if: steps.recheck.outputs.state == 'failure'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: mergai notes push

  # Handle code-review feedback on a mergai PR. Triggered by:
  #   * a `/mergai review fix` comment on the PR (issue_comment), or
  #   * a review submitted as "Changes requested" (pull_request_review).
  # Runs the agent over the PR's unresolved review threads, commits + pushes
  # the fixes inline on the PR branch, and posts a reply per thread. Mirrors
  # the ci-handle routing for a review branch: the fix rides as another commit
  # in the existing PR; nothing is folded here (that is finalize-only).
  review-handle:
    # The issue_comment trigger fires on every PR/issue comment in the repo, so
    # the command filter lives here; the head-branch (mergai-only) check can't
    # be expressed for issue_comment in `if:` (no head ref in the payload) and
    # is enforced in the "Resolve PR" step below. pull_request_review carries
    # the head ref, so we scope it to mergai/* and "Changes requested" up front.
    if: >-
      (github.event_name == 'pull_request_review'
        && github.event.review.state == 'changes_requested'
        && startsWith(github.event.pull_request.head.ref, 'mergai/'))
      || (github.event_name == 'issue_comment'
        && github.event.issue.pull_request != null
        && contains(github.event.comment.body, '/mergai review fix'))
    environment: privileged-ops
    runs-on: ubuntu-latest
    # Serialize per-PR branch-mutation runs so two near-simultaneous triggers
    # don't race on the head branch. The group key (mergai-pr-<number>) is
    # shared with rebase-handle so a `/mergai review fix` and a `/mergai rebase`
    # on the same PR can't run at once and clobber each other's push.
    # (Fast-Forward Merge is intentionally not in this group; a maintainer must
    # avoid running `/fast-forward` while a rebase is in flight.)
    concurrency:
      group: mergai-pr-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    env:
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
      GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION }}
      GOOGLE_GENAI_USE_VERTEXAI: "true"
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.PSMDB_BOT_GH_APP_ID }}
          private-key: ${{ secrets.PSMDB_BOT_GH_APP_PRIVATE_KEY }}

      # Resolve the PR number and head branch from whichever event fired, and
      # confirm it is a mergai PR (head branch under mergai/). The issue_comment
      # payload has no head ref, so we look it up; a non-mergai PR sets
      # is_mergai=false and every later step is skipped (the job ends green).
      - name: Resolve PR
        id: pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          # CUTOFF pins the run to the comment set as it stood when it was
          # triggered: the review's submission time, or the comment's creation
          # time. `mergai review fix --since` ignores anything posted (or
          # edited) after it, so a comment added while this run waits for the
          # privileged-ops approval cannot be pulled into the set.
          if [ "${{ github.event_name }}" = "pull_request_review" ]; then
            PR_NUMBER='${{ github.event.pull_request.number }}'
            HEAD_REF='${{ github.event.pull_request.head.ref }}'
            CUTOFF='${{ github.event.review.submitted_at }}'
          else
            PR_NUMBER='${{ github.event.issue.number }}'
            HEAD_REF=$(gh pr view "$PR_NUMBER" --json headRefName --jq .headRefName)
            CUTOFF='${{ github.event.comment.created_at }}'
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "cutoff=$CUTOFF" >> "$GITHUB_OUTPUT"
          echo "Resolved PR #$PR_NUMBER (head: $HEAD_REF, cutoff: $CUTOFF)"
          case "$HEAD_REF" in
            mergai/*) echo "is_mergai=true" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "is_mergai=false" >> "$GITHUB_OUTPUT"
              echo "PR #$PR_NUMBER is not a mergai PR; skipping." ;;
          esac

      - name: Checkout PR branch
        if: steps.pr.outputs.is_mergai == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup workflow environment
        if: steps.pr.outputs.is_mergai == 'true'
        uses: ./.github/actions/setup-mergai-workflow
        with:
          setup-gcp: "true"
          setup-gemini: "true"
          setup-claude: "true"
          setup-mergai: "true"
          gcp-credentials: ${{ secrets.GCP_CREDENTIALS }}
          claude-api-key: ${{ secrets.CLAUDE_API_KEY }}
          github-app-token: ${{ steps.app-token.outputs.token }}
          github-app-id: ${{ secrets.PSMDB_BOT_GH_APP_ID }}
          mergai-ref: master

      - name: Fetch and load mergai notes
        if: steps.pr.outputs.is_mergai == 'true'
        run: |
          mergai notes update
          mergai context init

      # Generate fixes for the PR's unresolved review threads. `review fix`
      # commits the fix on HEAD (the PR branch) and records a reply per thread
      # on the note; it does not post replies. We detect whether a commit
      # landed so the push step is conditional.
      - name: Generate review fixes
        id: review
        if: steps.pr.outputs.is_mergai == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          CUTOFF: ${{ steps.pr.outputs.cutoff }}
        run: |
          before=$(git rev-parse HEAD)
          # --ack posts a short acknowledgement comment on the PR (how many
          # comments were found / addressed / ignored, even if none) for quick
          # feedback. --since pins the comment set to the trigger time (CUTOFF).
          mergai review fix --pr-number "$PR_NUMBER" --since "$CUTOFF" --ack
          after=$(git rev-parse HEAD)
          if [ "$before" != "$after" ]; then
            echo "Review fix commit produced ($after)."
            echo "fix_produced=true" >> "$GITHUB_OUTPUT"
          else
            echo "No review fix commit produced."
            echo "fix_produced=false" >> "$GITHUB_OUTPUT"
          fi

      # Push the inline fix to the PR branch before posting replies, so the
      # "Addressed in <sha>" reply points at a commit that exists on the PR.
      - name: Push review-fix commit
        if: steps.pr.outputs.is_mergai == 'true' && steps.review.outputs.fix_produced == 'true'
        env:
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        run: git push origin "HEAD:$HEAD_REF"

      # Publish the recorded replies (fixed / unfixable) to their threads.
      - name: Post review replies
        if: steps.pr.outputs.is_mergai == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: mergai review post

      # Persist the review_fix solution's git note (attached to the new commit).
      - name: Push mergai notes
        if: steps.pr.outputs.is_mergai == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: mergai notes push

  # Rebase a mergai PR branch onto its base branch. Triggered by a
  # `/mergai rebase` comment on the PR. When the base branch (e.g. `master`)
  # advances after the PR opened, the head branch is no longer fast-forwardable
  # and `/fast-forward` fails; rebasing the mergai branch onto the current base
  # tip restores it. The rebase preserves merge commits and mergai notes and
  # reuses previously recorded conflict solutions, then force-pushes the branch.
  # As with review-handle, who may actually run this is gated by the
  # privileged-ops environment (a required reviewer approves the deployment);
  # the command filter and the mergai-branch check below scope *what* it acts on.
  rebase-handle:
    if: >-
      github.event_name == 'issue_comment'
      && github.event.issue.pull_request != null
      && contains(github.event.comment.body, '/mergai rebase')
    environment: privileged-ops
    runs-on: ubuntu-latest
    # Serialize per-PR branch-mutation runs. Uses the shared group key
    # (mergai-pr-<number>, see review-handle) so a `/mergai rebase` and a review
    # fix on the same PR can't run concurrently: both check out and push the
    # head branch, and a rebase force-push racing a review-fix push would
    # clobber one or the other. issue.number is always set here (issue_comment
    # only); the pull_request.number fallback just keeps the key identical to
    # review-handle. (Fast-Forward Merge is deliberately excluded -- a
    # maintainer must not run `/fast-forward` while a rebase is in flight.)
    concurrency:
      group: mergai-pr-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: false
    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ secrets.PSMDB_BOT_GH_APP_ID }}
          private-key: ${{ secrets.PSMDB_BOT_GH_APP_PRIVATE_KEY }}

      # Resolve the PR number, head branch and base branch (the issue_comment
      # payload carries none of them), and confirm this is a same-repo mergai
      # PR. Anything else sets is_mergai=false and every later step is skipped
      # (the job ends green).
      - name: Resolve PR
        id: pr
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          PR_NUMBER='${{ github.event.issue.number }}'
          read -r HEAD_REF BASE_REF CROSS_REPO < <(gh pr view "$PR_NUMBER" \
            --json headRefName,baseRefName,isCrossRepository \
            --jq '"\(.headRefName) \(.baseRefName) \(.isCrossRepository)"')
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "base_ref=$BASE_REF" >> "$GITHUB_OUTPUT"
          echo "Resolved PR #$PR_NUMBER (head: $HEAD_REF, base: $BASE_REF, cross_repo: $CROSS_REPO)"
          # Fork PRs: the head branch does not exist in this repo, so the
          # checkout below would fail and there is nothing we could push back.
          # Bail out early with a clear comment rather than a cryptic checkout
          # error. mergai's own branches are always same-repo.
          if [ "$CROSS_REPO" = "true" ]; then
            echo "is_mergai=false" >> "$GITHUB_OUTPUT"
            echo "PR #$PR_NUMBER is a fork (cross-repository) PR; /mergai rebase is not supported."
            gh pr comment "$PR_NUMBER" --body \
              "\`/mergai rebase\` is not supported for pull requests from forks: the head branch must live in this repository."
            exit 0
          fi
          case "$HEAD_REF" in
            mergai/*) echo "is_mergai=true" >> "$GITHUB_OUTPUT" ;;
            *)
              echo "is_mergai=false" >> "$GITHUB_OUTPUT"
              echo "PR #$PR_NUMBER is not a mergai PR; skipping." ;;
          esac

      - name: Checkout PR branch
        if: steps.pr.outputs.is_mergai == 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      # No AI tokens needed: `mergai rebase` auto-resolves only from previously
      # recorded solutions (deterministic), so this sets up the mergai CLI alone,
      # like solution-merged / semantic-merged.
      - name: Setup workflow environment
        if: steps.pr.outputs.is_mergai == 'true'
        uses: ./.github/actions/setup-mergai-workflow
        with:
          setup-gcp: "false"
          setup-gemini: "false"
          setup-claude: "false"
          setup-mergai: "true"
          github-app-token: ${{ steps.app-token.outputs.token }}
          github-app-id: ${{ secrets.PSMDB_BOT_GH_APP_ID }}
          mergai-ref: master

      # Rebase the branch onto the current base tip and force-push it.
      #   1. fetch the latest base branch tip;
      #   2. sync notes so recorded solutions can be reused during the rebase;
      #   3. rebuild the merge context (note.json) from the branch name / notes;
      #   4. rebase onto origin/<base> (preserves merge commits + notes);
      #   5. push notes (--context avoids pushing rebase-orphaned notes) and
      #      force-push the branch (type is the last path segment of the mergai
      #      branch name: mergai/<target>-<sha>/<type>).
      - name: Rebase onto base branch
        id: rebase
        if: steps.pr.outputs.is_mergai == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          BASE_REF: ${{ steps.pr.outputs.base_ref }}
        run: |
          set -e
          echo "Rebasing $HEAD_REF onto $BASE_REF"
          git fetch origin "$BASE_REF"
          mergai notes update
          mergai context init
          if ! mergai rebase "origin/$BASE_REF"; then
            mergai rebase --abort || true
            gh pr comment "$PR_NUMBER" --body \
              "\`/mergai rebase\` onto \`$BASE_REF\` could not complete automatically. Rebase locally with \`mergai notes update && mergai context init && mergai rebase origin/$BASE_REF\`, then push the branch and notes."
            echo "::error::mergai rebase onto '$BASE_REF' could not complete automatically (unresolved conflicts)."
            exit 1
          fi
          TYPE="${HEAD_REF##*/}"
          mergai notes push --context
          mergai branch push -f "$TYPE"
          # The rebase advanced merge_info.target_branch_sha, so refresh the PR
          # body (rebuilt from the current note data) to reflect the new base.
          mergai pr --repo "$GITHUB_REPOSITORY" update \
            || echo "::warning::'mergai pr update' failed"
          gh pr comment "$PR_NUMBER" --body \
            "Rebased \`$HEAD_REF\` onto \`$BASE_REF\` and force-pushed the branch."
          echo "Rebase of $HEAD_REF onto $BASE_REF completed successfully"
