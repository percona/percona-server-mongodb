name: mergai bot

on:
  workflow_dispatch:
    inputs:
      merge-pick:
        description: "Commit hash to merge (leave empty to use merge-pick --next)"
        required: false
        type: string
  pull_request:
    types: [closed]
    branches:
      - "mergai/*/conflict"
  workflow_run:
    workflows: ["clang-tidy", "format"]
    types: [completed]
    # Only react to workflows on mergai branches
    branches:
      - "mergai/**"

jobs:
  trigger-merge:
    # 'privileged-ops' environment controls access to merge operations and AI tokens
    environment: privileged-ops
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      GOOGLE_CLOUD_PROJECT: ${{ secrets.GOOGLE_CLOUD_PROJECT }}
      GOOGLE_CLOUD_LOCATION: ${{ secrets.GOOGLE_CLOUD_LOCATION }}
      GOOGLE_GENAI_USE_VERTEXAI: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PSMDB_BOT_GH_APP_ID }}
          private-key: ${{ secrets.PSMDB_BOT_GH_APP_PRIVATE_KEY }}

      # TODO: Add team membership check once GitHub App with Organization Members read permission is available
      # - name: Check team authorization
      #   env:
      #     GH_TOKEN: ${{ steps.app-token.outputs.token }}
      #   run: |
      #     echo "Checking if ${{ github.actor }} is a member of percona/dev-psmdb team..."
      #     if ! gh api "/orgs/percona/teams/dev-psmdb/memberships/${{ github.actor }}" --silent 2>/dev/null; then
      #       echo "::error::User ${{ github.actor }} is not authorized to trigger this workflow. Must be a member of percona/dev-psmdb team."
      #       exit 1
      #     fi
      #     echo "User ${{ github.actor }} is authorized"

      - name: Setup workflow environment
        uses: ./.github/actions/setup-mergai-workflow
        with:
          setup-gcp: "true"
          setup-gemini: "true"
          setup-mergai: "true"
          gcp-credentials: ${{ secrets.GCP_CREDENTIALS }}
          github-app-token: ${{ steps.app-token.outputs.token }}
          github-app-id: ${{ secrets.PSMDB_BOT_GH_APP_ID }}
          mergai-ref: master

      # Get next prioritized commit to merge from upstream based on configured strategies
      - name: mergai merge-pick
        if: ${{ !inputs['merge-pick'] }}
        run: |
          MERGE_PICK=$(mergai fork merge-pick --next)
          echo "MERGE_PICK=$MERGE_PICK" >> $GITHUB_ENV
          echo "Next merge pick is: $MERGE_PICK"
          git show --stat $MERGE_PICK

      # Initialize merge context with commit SHA and target branch info
      - name: mergai context init
        env:
          MERGE_PICK: ${{ inputs['merge-pick'] || env.MERGE_PICK }}
        run: |
          echo "MERGE_PICK=$MERGE_PICK" >> $GITHUB_ENV
          mergai context init $MERGE_PICK

      - name: merge
        run: |
          # Fetch and merge notes from remote
          mergai notes update

          # Attempt merge; exit code 0 = success, 1 = conflicts
          if mergai merge; then
            echo "Merge successful. Committing merge."
            mergai commit merge              # Create merge commit with note attached
            mergai branch create main        # Create and checkout main working branch
            mergai branch push main          # Push main branch to origin
            mergai notes push                # Push mergai notes to remote
            mergai pr --repo $GITHUB_REPOSITORY create main
          else
            echo "Merge conflict detected. Processing with resolution."
            mergai commit conflict           # Commit conflict state with markers
            mergai branch create conflict    # Create branch with conflict markers
            mergai branch create solution    # Create branch for AI solution
            mergai resolve -y                # Run AI conflict resolution (yolo mode)
            mergai commit solution           # Commit resolved files with note
            mergai branch push solution      # Push solution branch
            mergai branch push conflict      # Push conflict branch
            mergai notes push                # Push mergai notes to remote
            mergai pr --repo $GITHUB_REPOSITORY create solution
          fi

  solution-merged:
    # 'privileged-ops' environment controls access to merge operations
    environment: privileged-ops
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.PSMDB_BOT_GH_APP_ID }}
          private-key: ${{ secrets.PSMDB_BOT_GH_APP_PRIVATE_KEY }}

      - name: Setup workflow environment
        uses: ./.github/actions/setup-mergai-workflow
        with:
          setup-gcp: "false"
          setup-gemini: "false"
          setup-mergai: "true"
          github-app-token: ${{ steps.app-token.outputs.token }}
          github-app-id: ${{ secrets.PSMDB_BOT_GH_APP_ID }}
          mergai-ref: master

      # Finalize after solution PR is merged into conflict branch
      - name: Finalize
        run: |
          mergai notes update              # Fetch and merge notes from remote
          mergai context init              # Rebuild context from commit notes
          mergai branch create main        # Create main working branch
          mergai commit sync               # Sync manual commits to notes
          mergai finalize                  # Finalize into final merge commit
          mergai branch push main          # Push main branch to origin
          mergai notes push                # Push mergai notes to remote
          mergai pr --repo $GITHUB_REPOSITORY create main

  workflow-status:
    # Print workflow status when specific workflows complete on mergai branches
    # 'privileged-ops' environment controls access to merge operations
    # environment: privileged-ops
    if: github.event_name == 'workflow_run'
    runs-on: ubuntu-latest

    steps:
      - name: Print finished workflow details
        run: |
          echo "=== Workflow Run Completed ==="
          echo "Workflow: ${{ github.event.workflow_run.name }}"
          echo "Run ID: ${{ github.event.workflow_run.id }}"
          echo "Run Number: ${{ github.event.workflow_run.run_number }}"
          echo "Conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "Status: ${{ github.event.workflow_run.status }}"
          echo "Head Branch: ${{ github.event.workflow_run.head_branch }}"
          echo "Head SHA: ${{ github.event.workflow_run.head_sha }}"
          echo "URL: ${{ github.event.workflow_run.html_url }}"
          echo "Event: ${{ github.event.workflow_run.event }}"
          echo "Run Started At: ${{ github.event.workflow_run.run_started_at }}"
          echo "Updated At: ${{ github.event.workflow_run.updated_at }}"
          echo "Run Attempt: ${{ github.event.workflow_run.run_attempt }}"
          echo "Repository: ${{ github.event.workflow_run.repository.full_name }}"
          echo "Actor: ${{ github.event.workflow_run.actor.login }}"
          echo "Triggering Actor: ${{ github.event.workflow_run.triggering_actor.login }}"

      - name: Find associated PR and print all workflow statuses
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HEAD_SHA="${{ github.event.workflow_run.head_sha }}"
          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"

          echo ""
          echo "=== Finding PR for SHA: $HEAD_SHA ==="

          # Find PR associated with this commit (check both by SHA and by head branch)
          PR_DATA=$(gh api "repos/${{ github.repository }}/pulls?state=open&head=${{ github.repository_owner }}:${HEAD_BRANCH}" \
            --jq ".[0] | {number: .number, title: .title, url: .html_url, state: .state}" 2>/dev/null || echo "")

          if [ -z "$PR_DATA" ] || [ "$PR_DATA" = "null" ]; then
            # Fallback: search by SHA across all open PRs
            PR_DATA=$(gh api "repos/${{ github.repository }}/pulls?state=open" \
              --jq ".[] | select(.head.sha == \"$HEAD_SHA\") | {number: .number, title: .title, url: .html_url, state: .state}" 2>/dev/null | head -1 || echo "")
          fi

          if [ -z "$PR_DATA" ] || [ "$PR_DATA" = "null" ]; then
            echo "No open PR found for SHA $HEAD_SHA or branch $HEAD_BRANCH"
            exit 0
          fi

          PR_NUMBER=$(echo "$PR_DATA" | jq -r '.number')
          PR_TITLE=$(echo "$PR_DATA" | jq -r '.title')
          PR_URL=$(echo "$PR_DATA" | jq -r '.url')
          PR_STATE=$(echo "$PR_DATA" | jq -r '.state')

          echo "Found PR #$PR_NUMBER: $PR_TITLE"
          echo "URL: $PR_URL"
          echo "State: $PR_STATE"

          echo ""
          echo "=== All Check Runs for PR #$PR_NUMBER (SHA: $HEAD_SHA) ==="
          gh api "repos/${{ github.repository }}/commits/$HEAD_SHA/check-runs" \
            --jq '.check_runs[] | "[\(.conclusion // .status | ascii_upcase)] \(.name) - \(.html_url)"' | sort

          echo ""
          echo "=== Workflow Runs for SHA: $HEAD_SHA ==="
          gh api "repos/${{ github.repository }}/actions/runs?head_sha=$HEAD_SHA" \
            --jq '.workflow_runs[] | "[\(.conclusion // .status | ascii_upcase)] \(.name) (Run #\(.run_number)) - \(.html_url)"' | sort

          echo ""
          echo "=== Summary ==="
          TOTAL_CHECKS=$(gh api "repos/${{ github.repository }}/commits/$HEAD_SHA/check-runs" --jq '.total_count')
          SUCCESS_CHECKS=$(gh api "repos/${{ github.repository }}/commits/$HEAD_SHA/check-runs" --jq '[.check_runs[] | select(.conclusion == "success")] | length')
          FAILED_CHECKS=$(gh api "repos/${{ github.repository }}/commits/$HEAD_SHA/check-runs" --jq '[.check_runs[] | select(.conclusion == "failure")] | length')
          PENDING_CHECKS=$(gh api "repos/${{ github.repository }}/commits/$HEAD_SHA/check-runs" --jq '[.check_runs[] | select(.status == "in_progress" or .status == "queued" or .status == "pending")] | length')

          echo "Total Checks: $TOTAL_CHECKS"
          echo "Success: $SUCCESS_CHECKS"
          echo "Failed: $FAILED_CHECKS"
          echo "Pending/In Progress: $PENDING_CHECKS"
