name: format

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

# Cancel in-progress runs when new events occur (e.g., labels added after PR creation)
# This prevents race conditions where the 'opened' event triggers before labels are applied
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:
  # Gate job that fetches current PR labels via API to avoid race conditions
  # where the 'opened' event triggers before labels are applied
  check-skip:
    name: Check if workflow should be skipped
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      - name: Check for skip label
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch current PR labels via API to get fresh data
          LABELS=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} --jq '.labels[].name' 2>/dev/null || echo "")
          if echo "$LABELS" | grep -q "^ci-skip-format$"; then
            echo "Found ci-skip-format label, skipping workflow"
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No skip label found, proceeding with workflow"
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
          fi

  analyze:
    name: Check code formatting
    runs-on: ubuntu-latest
    needs: check-skip
    if: ${{ needs.check-skip.outputs.should_skip != 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: Run bazel format
        run: |
          # The --include_autogenerated_targets=True is needed to create the autogenerated targets.
          # Without it, bazel wrapper hook scripts append some additional args that break the formatting check.
          bazel run format --include_autogenerated_targets=True -- --origin-branch=origin/${{ github.base_ref }}

      - name: Verify formatting
        run: |
          # Ignore changes to MODULE.bazel.lock as it may be updated by bazel
          git checkout -- MODULE.bazel.lock 2>/dev/null || true
          if ! git diff --quiet; then
            echo "::error::Formatting issues detected."
            echo ""
            echo "Your PR is not properly formatted."
            echo ""
            echo "To fix the problem locally, run:"
            echo ""
            echo "    bazel run format"
            echo ""
            echo "and commit the resulting changes."
            echo ""
            echo "Affected files:"
            git diff --stat
            echo "Diff:"
            git diff | head -n 1000
            exit 1
          fi
