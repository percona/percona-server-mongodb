name: clang-tidy

on:
  pull_request:
    # Note: 'labeled' is intentionally excluded to avoid race conditions when
    # automation (e.g., mergai) creates a PR and immediately adds labels.
    # The 'opened' and 'labeled' events fire separately, causing duplicate runs.
    # Instead, we query the GitHub API for fresh label data in the check-skip job.
    # 'unlabeled' IS included so removing a skip label re-triggers the workflow.
    types: [opened, synchronize, reopened, unlabeled]

# Cancel in-progress runs only for 'synchronize' events (new commits pushed).
# For 'unlabeled' events, we use a unique group to avoid cancelling runs from
# other event types - this ensures removing a label always triggers a fresh run.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}-${{ github.event.action == 'unlabeled' && github.run_id || 'main' }}
  cancel-in-progress: ${{ github.event.action != 'unlabeled' }}

permissions:
  contents: read
  security-events: write

env:
  CLANG_TIDY_SARIF_VERSION: "0.8.0"

jobs:
  # Gate job that fetches current PR labels via API to avoid race conditions
  # where the 'opened' event triggers before labels are applied
  check-skip:
    name: Check if workflow should be skipped
    runs-on: self-hosted-arc-runners
    container: ubuntu:latest
    outputs:
      should_skip: ${{ steps.check.outputs.should_skip }}
    steps:
      - name: Check for skip label
        id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Fetch current PR labels via API to get fresh data
          LABELS=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} --jq '.labels[].name' 2>/dev/null || echo "")
          if echo "$LABELS" | grep -q "^ci-skip-clang-tidy$"; then
            echo "Found ci-skip-clang-tidy label, skipping workflow"
            echo "should_skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "No skip label found, proceeding with workflow"
            echo "should_skip=false" >> "$GITHUB_OUTPUT"
          fi

  changed_files:
    name: Check for changed C++ files
    runs-on: ubuntu-latest
    needs: check-skip
    if: ${{ needs.check-skip.outputs.should_skip != 'true' }}
    outputs:
      changed_files: ${{ steps.changed.outputs.all_changed_files }}
    steps:
      - uses: actions/checkout@v6
      - name: Get changed files
        id: changed
        uses: tj-actions/changed-files@v45
        with:
          files: |
            **/*.cpp
            **/*.c
      - name: List changed files
        run: |
          echo "Changed files: ${{ steps.changed.outputs.all_changed_files }}"

  analyze:
    name: Run clang-tidy analysis
    runs-on: ubuntu-latest
    if: ${{ needs.check-skip.outputs.should_skip != 'true' && needs.changed_files.outputs.changed_files != '' }}
    needs: [check-skip, changed_files]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: |
          git fetch --tags --force origin
          git describe --abbrev=0

      - name: Setup environment
        uses: ./.github/actions/setup-env

      - name: clang-tidy-sarif cache
        uses: actions/cache@v4
        id: clang_tidy_sarif_cache
        with:
          path: ~/.cargo
          key: ${{ runner.os }}-clang-tidy-sarif-${{ env.CLANG_TIDY_SARIF_VERSION }}

      - name: Install clang-tidy-sarif
        if: steps.clang_tidy_sarif_cache.outputs.cache-hit != 'true'
        run: cargo install clang-tidy-sarif --version "${CLANG_TIDY_SARIF_VERSION}" --locked

      - name: Generate compile_commands.json and build dependencies
        run: |
          {
            echo 'common --config=local'
            echo 'common --//bazel/config:build_enterprise=False'
            echo 'common --//bazel/config:compiler_type=clang'
          } > .bazelrc.compiledb
          # Build compiledb target - this triggers the wrapper hook which:
          # 1. Generates compile_commands.json via aquery
          # 2. Builds all gen_source targets (config.h, wiredtiger.h, etc.)
          # 3. Builds clang_tidy_config and copies .clang-tidy to repo root
          # Use both .bazelrc and .bazelrc.compiledb to retain baseline repo settings
          bazel \
            --bazelrc=.bazelrc \
            --bazelrc=.bazelrc.compiledb \
            build \
            //:compiledb \
            //src/mongo/tools/mongo_tidy_checks:mongo_tidy_checks
          # Build prometheus exporter to fetch external dependencies (prometheus-cpp)
          # needed for clang-tidy to analyze otel/metrics files.
          # This is not covered by gen_source tag.
          bazel \
            --bazelrc=.bazelrc \
            --bazelrc=.bazelrc.compiledb \
            build \
            //src/third_party/opentelemetry-cpp/exporters/prometheus:prometheus_exporter_utils

      - name: Verify clang-tidy config
        run: |
          # The compiledb wrapper hook should have generated .clang-tidy
          # If not present, build and copy explicitly as fallback
          if [ ! -f .clang-tidy ]; then
            echo "Warning: .clang-tidy not generated by compiledb, building explicitly"
            bazel \
              --bazelrc=.bazelrc \
              --bazelrc=.bazelrc.compiledb \
              build \
              //:clang_tidy_config
            cp bazel-bin/.clang-tidy .clang-tidy
          fi
          # Verify the file exists
          if [ ! -f .clang-tidy ]; then
            echo "Error: .clang-tidy file is missing"
            exit 1
          fi
          echo ".clang-tidy config is ready"

      - name: Run clang-tidy
        run: |
          CHANGED="${{ needs.changed_files.outputs.changed_files }}"
          echo "Changed C++ files: '$CHANGED'"
          external/mongo_toolchain_v5/v5/bin/clang-tidy \
            --load="bazel-bin/src/mongo/tools/mongo_tidy_checks/libmongo_tidy_checks.so" \
            $CHANGED \
          | clang-tidy-sarif --output=clang-tidy-results.sarif

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: clang-tidy-results.sarif
          category: clang-tidy
