# Section that is ignored by resmoke.py.
config_variables:
  - &keyFile jstests/percona/tde/ekf
  - &cipherMode AES256-CBC

test_kind: js_test

selector:
  roots:
    - jstests/aggregation/**/*.js
  exclude_files:
    - jstests/aggregation/extras/*.js
    - jstests/aggregation/data/*.js
  exclude_with_any_tags:
    - does_not_support_encrypted_storage_engine
    # resmoke normally auto-excludes mozjs_wasm_unsupported tests after detecting a
    # mozjs-wasm server via `mongod --version`, but that probe times out in the Bazel
    # remote-test runner (mongod isn't runnable at configure time), so the exclusion is
    # skipped even though the server IS mozjs-wasm. Exclude explicitly here.
    - mozjs_wasm_unsupported
executor:
  archive:
    hooks:
      - ValidateCollections
  config: {}
  hooks:
    - class: ValidateCollections
    - class: CleanEveryN
      n: 20
  fixture:
    class: MongoDFixture
    mongod_options:
      enableEncryption: ""
      encryptionKeyFile: *keyFile
      encryptionCipherMode: *cipherMode
      set_parameters:
        enableTestCommands: 1
